# 登录接口测试数据
test_module: 登录模块
test_cases:
  - name: 正常登录-成功
    endpoint: /api/auth/login
    method: POST
    headers:
      Content-Type: application/json
    params:
      username: admin
      password: admin123
    expected:
      status_code: 200
      body:
        code: 0
        message: 登录成功

  - name: 密码错误-登录失败
    endpoint: /api/auth/login
    method: POST
    headers:
      Content-Type: application/json
    params:
      username: admin
      password: wrong_password
    expected:
      status_code: 200
      body:
        code: 1001
        message: 用户名或密码错误

  - name: 空用户名-参数校验
    endpoint: /api/auth/login
    method: POST
    headers:
      Content-Type: application/json
    params:
      username: ""
      password: admin123
    expected:
      status_code: 400
      body:
        code: 1002
        message: 用户名不能为空
