# 用户管理接口测试数据
test_module: 用户管理模块
test_cases:
  - name: 获取用户列表-成功
    endpoint: /api/users
    method: GET
    headers:
      Authorization: Bearer ${token}
    params: null
    expected:
      status_code: 200
      body:
        code: 0
        message: success

  - name: 创建用户-成功
    endpoint: /api/users
    method: POST
    headers:
      Content-Type: application/json
      Authorization: Bearer ${token}
    params:
      username: testuser01
      email: testuser01@example.com
      role: normal
    expected:
      status_code: 200
      body:
        code: 0
        message: 创建成功

  - name: 重复用户名-创建失败
    endpoint: /api/users
    method: POST
    headers:
      Content-Type: application/json
      Authorization: Bearer ${token}
    params:
      username: admin
      email: admin@example.com
      role: normal
    expected:
      status_code: 200
      body:
        code: 2001
        message: 用户名已存在

  - name: 删除用户-成功
    endpoint: /api/users/999
    method: DELETE
    headers:
      Authorization: Bearer ${token}
    params: null
    expected:
      status_code: 200
      body:
        code: 0
        message: 删除成功
