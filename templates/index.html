<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试效能平台 TEP - 执行中心</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-logo">TEP</span>
            <span class="nav-title">测试效能平台 V1.3</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link active">执行中心</a>
            <a href="/cases" class="nav-link">用例管理</a>
            <a href="/scripts" class="nav-link">脚本管理</a>
            <a href="/reports-page" class="nav-link">报告看板</a>
        </div>
    </nav>

    <main class="main-content">
        <!-- 执行面板 -->
        <section class="card">
            <div class="card-header">
                <h2>执行测试</h2>
                <span class="badge badge-info" id="healthStatus">检测中...</span>
            </div>
            <div class="card-body">
                <div class="form-row">
                    <div class="form-group">
                        <label for="envSelect">执行环境</label>
                        <div class="env-select-row">
                            <select id="envSelect" class="form-control"></select>
                            <button class="btn btn-sm btn-outline" onclick="showEnvManager()">管理环境</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="markerInput">Markers 过滤（可选）</label>
                        <input type="text" id="markerInput" class="form-control" placeholder="例: smoke, regression">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskNameInput">任务名称</label>
                        <input type="text" id="taskNameInput" class="form-control" placeholder="例: 登录模块回归测试（可选，留空自动生成）">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label for="testpathInput">测试路径（可选）</label>
                        <input type="text" id="testpathInput" class="form-control" placeholder="例: testcases/test_api.py">
                    </div>
                </div>
                <div class="form-actions">
                    <button id="runBtn" class="btn btn-primary btn-lg" onclick="triggerRun()">
                        <span class="btn-icon">▶</span> 执行测试
                    </button>
                </div>
            </div>
        </section>

        <!-- 当前执行状态 -->
        <section class="card" id="currentTaskCard" style="display:none;">
            <div class="card-header">
                <h2>当前任务</h2>
                <span class="badge" id="currentTaskStatus">PENDING</span>
            </div>
            <div class="card-body">
                <div class="task-info-grid">
                    <div class="task-info-item"><span class="info-label">任务名称</span><span class="info-value" id="currentTaskName">-</span></div>
                    <div class="task-info-item"><span class="info-label">任务 ID</span><span class="info-value code" id="currentTaskId">-</span></div>
                    <div class="task-info-item"><span class="info-label">执行环境</span><span class="info-value" id="currentTaskEnv">-</span></div>
                    <div class="task-info-item"><span class="info-label">执行命令</span><span class="info-value code" id="currentTaskCmd">-</span></div>
                    <div class="task-info-item"><span class="info-label">开始时间</span><span class="info-value" id="currentTaskStart">-</span></div>
                    <div class="task-info-item"><span class="info-label">耗时</span><span class="info-value" id="currentTaskDuration">-</span></div>
                </div>
                <div class="log-section">
                    <div class="log-header">
                        <span>实时日志</span>
                        <button class="btn btn-sm btn-outline" onclick="toggleLog()">展开/折叠</button>
                    </div>
                    <pre class="log-content" id="logContent">等待执行...</pre>
                </div>
                <div class="report-link-section" id="reportLinkSection" style="display:none;">
                    <a id="reportLink" href="#" target="_blank" class="btn btn-success">📊 查看 Allure 报告</a>
                </div>
            </div>
        </section>

        <!-- 历史任务列表 -->
        <section class="card">
            <div class="card-header">
                <h2>执行历史</h2>
                <button class="btn btn-sm btn-outline" onclick="loadTasks()">刷新</button>
            </div>
            <div class="card-body">
                <div class="table-wrapper">
                    <table class="data-table" id="taskTable">
                        <thead>
                            <tr><th>任务名称</th><th>任务 ID</th><th>类型</th><th>环境/脚本</th><th>状态</th><th>通过/失败</th><th>耗时</th><th>开始时间</th><th>操作</th></tr>
                        </thead>
                        <tbody id="taskTableBody">
                            <tr><td colspan="8" class="empty-text">暂无执行记录</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- 环境管理弹窗 -->
    <div class="modal-overlay" id="envManagerModal" style="display:none;">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3>执行环境管理</h3>
                <button class="modal-close" onclick="hideEnvManager()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="env-list" id="envListContainer"></div>
                <hr style="margin: 16px 0; border-color: var(--gray-200);">
                <h4 style="margin-bottom: 12px;">新增环境</h4>
                <div class="form-row">
                    <div class="form-group"><label>环境 ID</label><input type="text" id="newEnvId" class="form-control" placeholder="例: prod_env"></div>
                    <div class="form-group"><label>环境名称</label><input type="text" id="newEnvName" class="form-control" placeholder="例: 生产环境"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Base URL</label><input type="text" id="newEnvBaseUrl" class="form-control" placeholder="例: http://api.example.com"></div>
                    <div class="form-group"><label>描述</label><input type="text" id="newEnvDesc" class="form-control" placeholder="例: 正式生产环境"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>数据库地址</label><input type="text" id="newEnvDbHost" class="form-control" placeholder="例: prod-mysql.internal"></div>
                    <div class="form-group"><label>数据库端口</label><input type="number" id="newEnvDbPort" class="form-control" value="3306"></div>
                    <div class="form-group"><label>超时(秒)</label><input type="number" id="newEnvTimeout" class="form-control" value="30"></div>
                </div>
                <button class="btn btn-primary" onclick="createEnvironment()">添加环境</button>
            </div>
        </div>
    </div>

    <!-- 编辑环境弹窗 -->
    <div class="modal-overlay" id="editEnvModal" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3>编辑环境 - <span id="editEnvTitle">-</span></h3>
                <button class="modal-close" onclick="hideEditEnvModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editEnvId">
                <div class="form-row">
                    <div class="form-group"><label>环境名称</label><input type="text" id="editEnvName" class="form-control"></div>
                    <div class="form-group"><label>Base URL</label><input type="text" id="editEnvBaseUrl" class="form-control"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>描述</label><input type="text" id="editEnvDesc" class="form-control"></div>
                    <div class="form-group"><label>数据库地址</label><input type="text" id="editEnvDbHost" class="form-control"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>数据库端口</label><input type="number" id="editEnvDbPort" class="form-control"></div>
                    <div class="form-group"><label>超时(秒)</label><input type="number" id="editEnvTimeout" class="form-control"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="hideEditEnvModal()">取消</button>
                <button class="btn btn-primary" onclick="updateEnvironment()">保存</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        let pollingTimer = null;

        checkHealth();
        loadEnvironments();
        loadTasks();

        // ---- 环境加载 ----
        async function loadEnvironments() {
            try {
                const resp = await fetch('/api/environments');
                const data = await resp.json();
                renderEnvSelect(data.environments);
            } catch (e) { console.error(e); }
        }

        function renderEnvSelect(envs) {
            const sel = document.getElementById('envSelect');
            sel.innerHTML = envs.map(e =>
                `<option value="${escapeHtml(e.id)}">${escapeHtml(e.name)} (${e.id})</option>`
            ).join('');
        }

        // ---- 环境管理 ----
        function showEnvManager() {
            loadEnvList();
            document.getElementById('envManagerModal').style.display = 'flex';
        }
        function hideEnvManager() { document.getElementById('envManagerModal').style.display = 'none'; }

        async function loadEnvList() {
            try {
                const resp = await fetch('/api/environments');
                const data = await resp.json();
                const container = document.getElementById('envListContainer');
                if (!data.environments || data.environments.length === 0) {
                    container.innerHTML = '<div class="empty-text">暂无环境</div>';
                    return;
                }
                container.innerHTML = data.environments.map(e => `
                    <div class="env-card">
                        <div class="env-card-header">
                            <span class="env-name">${escapeHtml(e.name)}</span>
                            <span class="badge badge-info">${escapeHtml(e.id)}</span>
                        </div>
                        <div class="env-card-body">
                            ${e.base_url ? `<div><span class="info-label">Base URL:</span> ${escapeHtml(e.base_url)}</div>` : ''}
                            ${e.description ? `<div><span class="info-label">描述:</span> ${escapeHtml(e.description)}</div>` : ''}
                            ${e.db_host ? `<div><span class="info-label">数据库:</span> ${escapeHtml(e.db_host)}:${e.db_port}</div>` : ''}
                            <div><span class="info-label">超时:</span> ${e.timeout}s</div>
                        </div>
                        <div class="env-card-actions">
                            <button class="btn btn-sm btn-outline" onclick='editEnvironment(${JSON.stringify(e).replace(/'/g, "&#39;")})'>编辑</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteEnvironment('${escapeHtml(e.id)}')">删除</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { showToast('加载环境失败', e.message, 'error'); }
        }

        async function createEnvironment() {
            const body = {
                id: document.getElementById('newEnvId').value.trim(),
                name: document.getElementById('newEnvName').value.trim(),
                base_url: document.getElementById('newEnvBaseUrl').value.trim(),
                description: document.getElementById('newEnvDesc').value.trim(),
                db_host: document.getElementById('newEnvDbHost').value.trim(),
                db_port: parseInt(document.getElementById('newEnvDbPort').value) || 3306,
                timeout: parseInt(document.getElementById('newEnvTimeout').value) || 30,
            };
            if (!body.id || !body.name) { showToast('ID和名称必填', '', 'error'); return; }
            try {
                const resp = await fetch('/api/environments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await resp.json();
                if (resp.ok) {
                    showToast('创建成功', data.message, 'success');
                    loadEnvList();
                    loadEnvironments();
                    // 清空表单
                    ['newEnvId','newEnvName','newEnvBaseUrl','newEnvDesc','newEnvDbHost'].forEach(id => document.getElementById(id).value = '');
                } else { showToast('创建失败', data.detail, 'error'); }
            } catch (e) { showToast('创建失败', e.message, 'error'); }
        }

        function editEnvironment(env) {
            document.getElementById('editEnvId').value = env.id;
            document.getElementById('editEnvTitle').textContent = env.name;
            document.getElementById('editEnvName').value = env.name || '';
            document.getElementById('editEnvBaseUrl').value = env.base_url || '';
            document.getElementById('editEnvDesc').value = env.description || '';
            document.getElementById('editEnvDbHost').value = env.db_host || '';
            document.getElementById('editEnvDbPort').value = env.db_port || 3306;
            document.getElementById('editEnvTimeout').value = env.timeout || 30;
            document.getElementById('editEnvModal').style.display = 'flex';
        }
        function hideEditEnvModal() { document.getElementById('editEnvModal').style.display = 'none'; }

        async function updateEnvironment() {
            const body = {
                id: document.getElementById('editEnvId').value,
                name: document.getElementById('editEnvName').value.trim(),
                base_url: document.getElementById('editEnvBaseUrl').value.trim(),
                description: document.getElementById('editEnvDesc').value.trim(),
                db_host: document.getElementById('editEnvDbHost').value.trim(),
                db_port: parseInt(document.getElementById('editEnvDbPort').value) || 3306,
                timeout: parseInt(document.getElementById('editEnvTimeout').value) || 30,
            };
            try {
                const resp = await fetch('/api/environments', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await resp.json();
                if (resp.ok) {
                    showToast('更新成功', data.message, 'success');
                    hideEditEnvModal();
                    loadEnvList();
                    loadEnvironments();
                } else { showToast('更新失败', data.detail, 'error'); }
            } catch (e) { showToast('更新失败', e.message, 'error'); }
        }

        async function deleteEnvironment(envId) {
            if (!confirm(`确定删除环境「${envId}」？`)) return;
            try {
                const resp = await fetch(`/api/environments/${encodeURIComponent(envId)}`, { method: 'DELETE' });
                const data = await resp.json();
                if (resp.ok) {
                    showToast('删除成功', data.message, 'success');
                    loadEnvList();
                    loadEnvironments();
                } else { showToast('删除失败', data.detail, 'error'); }
            } catch (e) { showToast('删除失败', e.message, 'error'); }
        }

        // ---- 执行测试 ----
        async function triggerRun() {
            const env = document.getElementById('envSelect').value;
            const markers = document.getElementById('markerInput').value.trim() || null;
            const testcase_path = document.getElementById('testpathInput').value.trim() || null;
            const task_name = document.getElementById('taskNameInput').value.trim() || null;
            const runBtn = document.getElementById('runBtn');
            runBtn.disabled = true;
            runBtn.innerHTML = '<span class="spinner"></span> 提交中...';
            try {
                const resp = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ env, markers, testcase_path, task_name }),
                });
                const data = await resp.json();
                if (resp.ok) {
                    showToast('任务已提交', `任务: ${data.task_name || data.task_id}`, 'success');
                    showCurrentTask(data.task_id, env, data.task_name);
                    startPolling(data.task_id);
                } else { showToast('提交失败', data.detail, 'error'); }
            } catch (e) { showToast('网络错误', e.message, 'error'); }
            finally { runBtn.disabled = false; runBtn.innerHTML = '<span class="btn-icon">▶</span> 执行测试'; }
        }

        function showCurrentTask(taskId, env, taskName) {
            document.getElementById('currentTaskCard').style.display = 'block';
            document.getElementById('currentTaskName').textContent = taskName || '-';
            document.getElementById('currentTaskId').textContent = taskId;
            document.getElementById('currentTaskEnv').textContent = env;
            document.getElementById('currentTaskStatus').textContent = 'PENDING';
            document.getElementById('currentTaskStatus').className = 'badge badge-warning';
            document.getElementById('currentTaskCmd').textContent = '-';
            document.getElementById('currentTaskStart').textContent = '-';
            document.getElementById('currentTaskDuration').textContent = '-';
            document.getElementById('logContent').textContent = '等待执行...';
            document.getElementById('reportLinkSection').style.display = 'none';
        }

        function startPolling(taskId) {
            if (pollingTimer) clearInterval(pollingTimer);
            pollingTimer = setInterval(async () => {
                try {
                    const resp = await fetch(`/api/status/${taskId}`);
                    const data = await resp.json();
                    document.getElementById('currentTaskStatus').textContent = data.status;
                    document.getElementById('currentTaskName').textContent = data.task_name || '-';
                    document.getElementById('currentTaskCmd').textContent = data.command || '-';
                    document.getElementById('currentTaskStart').textContent = data.created_at || '-';
                    document.getElementById('currentTaskDuration').textContent = data.duration || '-';
                    if (data.status === 'RUNNING') {
                        document.getElementById('currentTaskStatus').className = 'badge badge-info';
                    } else if (data.status === 'FINISHED') {
                        document.getElementById('currentTaskStatus').className = 'badge badge-success';
                        stopPolling();
                        showToast('执行完成', `任务 ${taskId} 已完成`, 'success');
                        loadTasks();
                    } else if (data.status === 'ERROR') {
                        document.getElementById('currentTaskStatus').className = 'badge badge-danger';
                        stopPolling();
                        showToast('执行出错', `任务 ${taskId} 执行失败`, 'error');
                        loadTasks();
                    }
                    if (data.log) {
                        document.getElementById('logContent').textContent = data.log;
                        document.getElementById('logContent').scrollTop = document.getElementById('logContent').scrollHeight;
                    }
                    if (data.report_url && (data.status === 'FINISHED' || data.status === 'ERROR')) {
                        document.getElementById('reportLinkSection').style.display = 'block';
                        document.getElementById('reportLink').href = data.report_url;
                    }
                    if (data.summary && data.summary.total !== null) {
                        document.getElementById('currentTaskDuration').textContent =
                            `${data.duration || '-'} (${data.summary.passed || 0}通过 / ${data.summary.failed || 0}失败)`;
                    }
                } catch (e) { console.error(e); }
            }, 2000);
        }

        function stopPolling() { if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; } }

        async function loadTasks() {
            try {
                const resp = await fetch('/api/tasks?limit=20');
                const data = await resp.json();
                renderTaskTable(data.tasks);
            } catch (e) { console.error(e); }
        }

        function renderTaskTable(tasks) {
            const tbody = document.getElementById('taskTableBody');
            if (!tasks || tasks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="empty-text">暂无执行记录</td></tr>';
                return;
            }
            tbody.innerHTML = tasks.map(t => {
                const statusBadge = getStatusBadge(t.status);
                const typeBadge = t.task_type === 'script' ? '<span class="badge badge-warning">脚本</span>' : '<span class="badge badge-info">Pytest</span>';
                const summaryText = t.summary && t.summary.total !== null ? `${t.summary.passed||0}/${t.summary.failed||0}` : '-';
                const reportBtn = t.report_url ? `<a href="${t.report_url}" target="_blank" class="btn btn-sm btn-success">报告</a>` : '';
                const envLabel = t.task_type === 'script' ? (t.script_name || '-') : (t.env || '-');
                const displayName = t.task_name || '-';
                return `<tr>
                    <td><strong>${escapeHtml(displayName)}</strong></td>
                    <td class="mono" style="font-size:11px;color:var(--gray-400);">${t.task_id}</td>
                    <td>${typeBadge}</td>
                    <td>${escapeHtml(envLabel)}</td>
                    <td>${statusBadge}</td>
                    <td>${summaryText}</td>
                    <td>${t.duration || '-'}</td>
                    <td>${t.created_at}</td>
                    <td><button class="btn btn-sm btn-outline" onclick="viewLog('${t.task_id}')">日志</button>${reportBtn}</td>
                </tr>`;
            }).join('');
        }

        async function viewLog(taskId) {
            try {
                const resp = await fetch(`/api/log/${taskId}`);
                const data = await resp.json();
                document.getElementById('currentTaskCard').style.display = 'block';
                document.getElementById('logContent').textContent = data.log || '无日志';
                document.getElementById('currentTaskName').textContent = '(历史)';
                document.getElementById('currentTaskId').textContent = taskId;
            } catch (e) { showToast('获取日志失败', e.message, 'error'); }
        }

        function toggleLog() { document.getElementById('logContent').classList.toggle('collapsed'); }

        async function checkHealth() {
            try {
                const resp = await fetch('/api/health');
                const data = await resp.json();
                document.getElementById('healthStatus').textContent = `在线 | 运行中: ${data.running_tasks}`;
                document.getElementById('healthStatus').className = 'badge badge-success';
            } catch {
                document.getElementById('healthStatus').textContent = '离线';
                document.getElementById('healthStatus').className = 'badge badge-danger';
            }
        }
    </script>
</body>
</html>
